<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook Verse | Premium Recipes & Food Blog</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons via CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #fafaf9;
      color: #292524;
    }
    .serif-title {
      font-family: 'Playfair Display', Georgia, Cambria, serif;
    }
    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
    
    <!-- Secret Access Door Alert Banner -->
    <div id="secretAlert" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-amber-950 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-amber-500/20 hidden">
            <i data-lucide="lock" class="w-6 h-6 text-amber-500 animate-pulse"></i>
            <div>
            <span class="font-extrabold text-sm block id-secret-title">Secret Admin Portal Unlocked!</span>
            <span class="text-stone-300 text-xs id-secret-desc">Redirecting you to admin login...</span>
            </div>
    </div>

    <!-- Logo (Double click secret entry) -->
    <div id="logoBtn" class="flex items-center gap-3 cursor-pointer hover:opacity-95 select-none" title="Double-click to launch Admin Panel">
          <div class="bg-amber-500 text-white p-2.5 rounded-xl shadow-md shadow-amber-500/10 flex items-center justify-center">
            <i data-lucide="chef-hat" class="w-6 h-6"></i>
          </div>
          <div>
            <span class="text-2xl font-bold tracking-tight text-amber-950 flex items-center gap-1.5">
              <span class="id-site-title">Cook Verse</span>
              <span class="text-[10px] px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded-full font-semibold flex items-center gap-0.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-600 animate-pulse"></span>
                AdSense Ready
              </span>
            </span>
            <span class="block text-xs text-stone-400 -mt-0.5 id-site-tagline">Premium Recipes & Food Blog</span>
          </div>
    </div>

</body>
</html>
